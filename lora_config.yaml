# MLX-LM LoRA 微调配置 — Qwen2.5-1.5B-Instruct 文白互译
# Run #3: 折中超参 — 在 Run#1 表达力 与 Run#2 稳定性 之间找平衡

model: "./models/Qwen2.5-1.5B-Instruct"
train: true
data: "data"
seed: 42

num_layers: 8

# 训练超参 — Run #3
batch_size: 2
iters: 300              # 在 Run#1(600) 与 Run#2(400) 之间，配合更密的 eval
learning_rate: 1.0e-5
max_seq_length: 1024

# 评估 / 保存 — 更密，便于精准选 checkpoint
steps_per_report: 20
steps_per_eval: 25
val_batches: 10
save_every: 25

adapter_path: "adapters"

# LoRA 结构 — 折中：保留一定表达力，加少量正则
fine_tune_type: lora
lora_parameters:
  rank: 6                # Run#1=8, Run#2=4
  scale: 18.0
  dropout: 0.02          # Run#1=0, Run#2=0.05
